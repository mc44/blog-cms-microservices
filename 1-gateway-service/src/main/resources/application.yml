server:
  port: 8080

spring:
  application:
    name: gateway-service
  config:
    import: optional:file:./config/localhost.properties
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: ${AUTH_SERVICE_URL:http://auth-service:8081}
          predicates:
            - Path=/auth/**
        - id: blog-service
          uri: ${BLOG_SERVICE_URL:http://blog-service:8082}
          predicates:
            - Path=/blog/**
        - id: media-service
          uri: ${MEDIA_SERVICE_URL:http://media-service:8083}
          predicates:
            - Path=/media/**
        - id: audit-service
          uri: ${AUDIT_SERVICE_URL:http://audit-service:8084}
          predicates:
            - Path=/audit/**

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

logging:
  pattern:
    level: "%5p [${spring.application.name:},%X{correlationId:-}]"
